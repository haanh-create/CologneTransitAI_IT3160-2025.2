<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cologne Transit Pathfinding - AI Project</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #e74c3c;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --accent: #f1c40f;
            --success: #2ecc71;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            color: white;
            overflow: hidden;
        }

        #map {
            height: 100vh;
            width: 100%;
            z-index: 1;
        }

        .side-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 320px;
            background: rgba(44, 62, 80, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            z-index: 1000;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .panel-header {
            padding: 20px;
            background: var(--primary);
            border-radius: 12px 12px 0 0;
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-content {
            padding: 20px;
            overflow-y: auto;
        }

        .section-title {
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: #bdc3c7;
            margin-bottom: 15px;
            margin-top: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }

        .info-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .info-label { color: #95a5a6; }
        .info-value { font-weight: 600; color: var(--accent); }

        /* Admin Controls */
        #line-controls {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .line-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 8px 12px;
            border-radius: 6px;
        }

        /* Switch Styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #555;
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-reset {
            width: 100%;
            padding: 10px;
            background: #34495e;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-reset:hover { background: #455a64; }

        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #333;
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 20px;">Đang tải dữ liệu mạng lưới...</p>
    </div>

    <div class="side-panel">
        <div class="panel-header">
            <span>Köln Transit AI</span>
            <span style="font-size: 0.8rem; opacity: 0.8;">Admin v1.0</span>
        </div>
        
        <div class="panel-content">
            <div class="section-title">Tìm đường đi</div>
            <div class="info-card">
                <div class="info-row">
                    <span class="info-label">Điểm đi:</span>
                    <span id="startInfo" class="info-value">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Điểm đến:</span>
                    <span id="endInfo" class="info-value">—</span>
                </div>
                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0;">
                <div class="info-row">
                    <span class="info-label">Tổng khoảng cách:</span>
                    <span id="distInfo" class="info-value">—</span>
                </div>
                <button class="btn-reset" onclick="resetSelection()">Xóa chọn điểm</button>
            </div>

            <div class="section-title">Quản trị Tuyến (Admin)</div>
            <div id="line-controls">
                <!-- Lines will be populated here -->
                <p style="font-size: 0.8rem; color: #777;">Đang tải danh sách tuyến...</p>
            </div>
            
            <p style="font-size: 0.7rem; color: #7f8c8d; margin-top: 20px; line-height: 1.4;">
                * Click vào trạm trên bản đồ để chọn điểm đi/đến.<br>
                * Gạt công tắc để vô hiệu hóa tuyến tàu.
            </p>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/api.js"></script>
    <script src="js/cologne_map.js"></script>
    
    <script>
        // Override window.onload to show loading overlay, then hide after init
        window.onload = async function() {
            await initCologneMap();
            document.getElementById('loading-overlay').style.display = 'none';
        };
    </script>
</body>
</html>
